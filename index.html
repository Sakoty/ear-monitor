<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Band Monitor</title>

<style>

body{
background:#070707;
color:#00ff9c;
font-family:monospace;
text-align:center;
}

#bpmDisplay{
font-size:70px;
text-shadow:0 0 20px #00ff9c;
}

#countDisplay{
font-size:40px;
margin-top:10px;
}

.slider{
width:80%;
}

button{
background:#111;
border:2px solid #00ff9c;
color:#00ff9c;
padding:12px 30px;
margin:10px;
}

.fader{
height:200px;
}

</style>
</head>

<body>

<h2>BAND MONITOR</h2>

<div id="bpmDisplay">120 BPM</div>
<div id="countDisplay">1</div>

<input
type="range"
id="bpmSlider"
class="slider"
min="60"
max="200"
value="120">

<br>

<button id="enableAudio">Audio ON</button>
<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<br><br>

<input type="file" id="audioUpload">

<br><br>

音量

<br>

<input
type="range"
min="0"
max="1"
step="0.01"
value="1"
id="volumeFader"
class="fader">

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
doc,
updateDoc,
onSnapshot,
setDoc,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";


const firebaseConfig={

};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const storage=getStorage(app);

const roomRef=doc(db,"rooms","bandroom");

let audioContext;
let gainNode;

let buffer;
let source;

let bpm=120;

let timeOffset=0;

let beat=1;


/* Audio ON */

document.getElementById("enableAudio").onclick=async()=>{

audioContext=new(window.AudioContext||window.webkitAudioContext)();

await audioContext.resume();

gainNode=audioContext.createGain();

gainNode.connect(audioContext.destination);

await syncServerTime();

};


/* BPMスライダー */

const bpmSlider=document.getElementById("bpmSlider");

bpmSlider.oninput=(e)=>{

bpm=e.target.value;

document.getElementById("bpmDisplay").innerText=bpm+" BPM";

updateDoc(roomRef,{bpm:bpm});

};


/* 音量 */

document.getElementById("volumeFader").oninput=(e)=>{

if(gainNode)gainNode.gain.value=e.target.value;

};


/* MP3アップロード */

document.getElementById("audioUpload")
.addEventListener("change",async(e)=>{

const file=e.target.files[0];

const storageRef=ref(storage,"audio/"+file.name);

await uploadBytes(storageRef,file);

const url=await getDownloadURL(storageRef);

await updateDoc(roomRef,{audioURL:url});

});


/* サーバー時刻同期 */

async function syncServerTime(){

const refDoc=doc(db,"rooms","timeSync");

await setDoc(refDoc,{now:serverTimestamp()});

onSnapshot(refDoc,(snap)=>{

if(!snap.data())return;

const serverTime=snap.data().now.toMillis();

timeOffset=serverTime-Date.now();

});

}


/* メトロノーム */

function startMetronome(startTime){

let interval=60/bpm;

let next=startTime;

setInterval(()=>{

while(next<audioContext.currentTime+0.1){

const osc=audioContext.createOscillator();

const gain=audioContext.createGain();

if(beat==1){

osc.frequency.value=1500;

}else{

osc.frequency.value=1000;

}

gain.gain.value=0.7;

osc.connect(gain);

gain.connect(gainNode);

osc.start(next);

osc.stop(next+0.05);

document.getElementById("countDisplay").innerText=beat;

beat++;

if(beat>4)beat=1;

next+=interval;

}

},25);

}


/* START */

document.getElementById("startBtn").onclick=async()=>{

const startAt=Date.now()+timeOffset+5000;

await updateDoc(roomRef,{

isPlaying:true,
startAt:startAt,
updatedAt:serverTimestamp()

});

};


/* STOP */

document.getElementById("stopBtn").onclick=async()=>{

await updateDoc(roomRef,{isPlaying:false});

if(source)source.stop();

};


/* Firestore監視 */

onSnapshot(roomRef,async(snap)=>{

const data=snap.data();

if(!data)return;


/* BPM同期 */

if(data.bpm){

bpm=data.bpm;

document.getElementById("bpmSlider").value=bpm;

document.getElementById("bpmDisplay").innerText=bpm+" BPM";

}


/* 音源読み込み */

if(data.audioURL && !buffer){

const res=await fetch(data.audioURL);

const arr=await res.arrayBuffer();

buffer=await audioContext.decodeAudioData(arr);

}


/* 再生 */

if(data.isPlaying){

if(!audioContext)return;

const delay=(data.startAt-Date.now()-timeOffset)/1000;

if(buffer){

source=audioContext.createBufferSource();

source.buffer=buffer;

source.connect(gainNode);

source.start(audioContext.currentTime+delay);

}

startMetronome(audioContext.currentTime+delay);

}

});


</script>

</body>
</html>
