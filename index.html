<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Band Monitor</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>

body{
margin:0;
background:#07070a;
color:#00ff9c;
font-family:monospace;
text-align:center;
}

header{
padding:15px;
border-bottom:1px solid #00ff9c;
font-size:20px;
}

.status{
display:flex;
justify-content:space-around;
margin:10px;
}

.bpm{
font-size:70px;
text-shadow:0 0 20px #00ff9c;
}

.count{
font-size:90px;
height:90px;
}

.led{
width:22px;
height:22px;
border-radius:50%;
background:#111;
display:inline-block;
margin:10px;
}

.led.on{
background:#ff0033;
box-shadow:0 0 20px #ff0033;
}

.controls button{
background:#111;
border:2px solid #00ff9c;
color:#00ff9c;
padding:12px 25px;
margin:8px;
font-size:16px;
}

.slider{
width:80%;
margin:15px;
}

.mixer{
display:flex;
justify-content:center;
gap:40px;
margin-top:40px;
}

.channel{
display:flex;
flex-direction:column;
align-items:center;
}

.fader{
writing-mode: bt-lr;
-webkit-appearance: slider-vertical;
height:150px;
}

.player{
margin-top:30px;
border-top:1px solid #00ff9c;
padding-top:20px;
}

input{
background:#000;
color:#00ff9c;
border:1px solid #00ff9c;
padding:8px;
}

iframe{
margin-top:15px;
}

.latencyBox{
margin-top:25px;
border-top:1px solid #00ff9c;
padding-top:15px;
}

</style>
</head>

<body>

<header>LIVE BAND MONITOR</header>

<div class="status">

<div>
接続人数  
<div id="users">0</div>
</div>

<div class="bpm" id="bpmDisplay">120</div>

</div>

<input type="range" id="tempoSlider" min="40" max="240" value="120" class="slider">

<div class="count" id="countdown"></div>

<div class="led" id="tempoLed"></div>

<div class="controls">

<button id="enableAudio">AUDIO</button>
<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

</div>

<div class="mixer">

<div class="channel">
<input type="range" class="fader" id="clickVolume" min="0" max="1" step="0.01" value="1">
CLICK
</div>

<div class="channel">
<input type="range" class="fader" id="musicVolume" min="0" max="1" step="0.01" value="1">
MUSIC
</div>

<div class="channel">
<input type="range" class="fader" id="masterVolume" min="0" max="1" step="0.01" value="1">
MASTER
</div>

</div>

<div class="latencyBox">

<h3>Bluetooth遅延測定</h3>

<button id="latencyTest">遅延テスト</button>

<div>測定結果 <span id="latencyValue">0</span> ms</div>

<input type="range" id="latencySlider" min="-300" max="300" value="0" step="1" class="slider">

<div>補正値 <span id="latencyAdjust">0</span> ms</div>

</div>

<div class="player">

<h3>音源共有</h3>

<input type="text" id="youtubeURL" placeholder="YouTube URL">
<button id="shareYT">YouTube共有</button>

<br><br>

<input type="file" id="mp3File">
<button id="shareMP3">MP3共有</button>

<div id="youtubePlayer"></div>

<audio id="audioPlayer" controls></audio>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, update, onDisconnect, set }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAqx",
authDomain:"earmonitor.firebaseapp.com",
databaseURL:"https://earmonitor-default-rtdb.firebaseio.com/",
projectId:"earmonitor"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const room="bandroom1";

const roomRef=ref(db,"rooms/"+room);
const usersRef=ref(db,"rooms/"+room+"/users");

const userId=Math.random().toString(36).substr(2,9);

set(ref(db,"rooms/"+room+"/users/"+userId),true);

onDisconnect(ref(db,"rooms/"+room+"/users/"+userId)).remove();

onValue(usersRef,(snap)=>{

const data=snap.val();
if(!data)return;

document.getElementById("users").textContent=Object.keys(data).length;

});

let audioContext;
let clickGain;
let musicGain;
let masterGain;

let ytPlayer;
let ytReady=false;

let latencyOffset=0;

let currentBpm=120;

let nextNoteTime=0;
let schedulerTimer;

let lookahead=25;
let scheduleAhead=0.1;

let secondsPerBeat=0.5;

document.getElementById("enableAudio").onclick=async()=>{

audioContext=new(window.AudioContext||window.webkitAudioContext)();

clickGain=audioContext.createGain();
musicGain=audioContext.createGain();
masterGain=audioContext.createGain();

clickGain.connect(masterGain);
musicGain.connect(masterGain);
masterGain.connect(audioContext.destination);

};

document.getElementById("clickVolume").oninput=e=>{
clickGain.gain.value=e.target.value;
};

document.getElementById("musicVolume").oninput=e=>{
musicGain.gain.value=e.target.value;
};

document.getElementById("masterVolume").oninput=e=>{
masterGain.gain.value=e.target.value;
};

const tempoSlider=document.getElementById("tempoSlider");

tempoSlider.oninput=e=>{

currentBpm=parseInt(e.target.value);

document.getElementById("bpmDisplay").textContent=currentBpm;

update(roomRef,{bpm:currentBpm});

};

document.getElementById("startBtn").onclick=()=>{

const startTime=Date.now()+3000;

update(roomRef,{
startAt:startTime,
bpm:currentBpm,
playing:true
});

};

document.getElementById("stopBtn").onclick=()=>{

update(roomRef,{playing:false});

stopMetronome();

};

function scheduler(){

while(nextNoteTime<audioContext.currentTime+scheduleAhead){

playClick(nextNoteTime+latencyOffset);

flash();

nextNoteTime+=secondsPerBeat;

}

}

function playClick(time){

const osc=audioContext.createOscillator();
const gain=audioContext.createGain();

osc.frequency.value=1500;

gain.gain.value=0.6;

osc.connect(gain);
gain.connect(clickGain);

osc.start(time);
osc.stop(time+0.05);

}

function startMetronome(){

secondsPerBeat=60/currentBpm;

nextNoteTime=audioContext.currentTime;

schedulerTimer=setInterval(scheduler,lookahead);

}

function stopMetronome(){

clearInterval(schedulerTimer);

}

function flash(){

const led=document.getElementById("tempoLed");

led.classList.add("on");

setTimeout(()=>led.classList.remove("on"),100);

}

document.getElementById("shareYT").onclick=()=>{

const url=document.getElementById("youtubeURL").value;

const id=url.split("v=")[1].split("&")[0];

update(roomRef,{
youtube:id,
ytStart:Date.now(),
ytPlay:true
});

};

document.getElementById("shareMP3").onclick=()=>{

const file=document.getElementById("mp3File").files[0];

const reader=new FileReader();

reader.onload=e=>{

update(roomRef,{
mp3:e.target.result,
mp3Start:Date.now()
});

};

reader.readAsDataURL(file);

};

window.onYouTubeIframeAPIReady=function(){

ytPlayer=new YT.Player("youtubePlayer",{

height:"170",
width:"300",
videoId:"",
playerVars:{playsinline:1},

events:{
onReady:()=>{
ytReady=true;
}
}

});

};

document.getElementById("latencyTest").onclick=async()=>{

const start=audioContext.currentTime;

playClick(start);

setTimeout(()=>{

const end=audioContext.currentTime;

const diff=(end-start)*1000;

document.getElementById("latencyValue").textContent=Math.round(diff);

},200);

};

document.getElementById("latencySlider").oninput=e=>{

latencyOffset=parseInt(e.target.value)/1000;

document.getElementById("latencyAdjust").textContent=e.target.value;

};

onValue(roomRef,(snap)=>{

const data=snap.val();
if(!data)return;

currentBpm=data.bpm||120;

document.getElementById("bpmDisplay").textContent=currentBpm;
tempoSlider.value=currentBpm;

if(data.playing){

startMetronome();

}else{

stopMetronome();

}

if(data.youtube && ytReady){

if(ytPlayer.getVideoData().video_id!==data.youtube){

ytPlayer.loadVideoById(data.youtube);

}

const diff=(Date.now()-data.ytStart)/1000;

ytPlayer.seekTo(diff,true);
ytPlayer.playVideo();

}

if(data.mp3){

const player=document.getElementById("audioPlayer");

player.src=data.mp3;

const diff=(Date.now()-data.mp3Start)/1000;

player.currentTime=diff;

player.play();

}

});

</script>

</body>
</html>
