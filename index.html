<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sync Monitor</title>

<style>
body{
  margin:0;
  background:#0b0b0f;
  color:#00ff99;
  font-family:monospace;
  text-align:center;
}
header{
  padding:15px;
  font-size:20px;
  border-bottom:1px solid #00ff99;
}
.bpm{
  font-size:70px;
  text-shadow:0 0 20px #00ff99;
  margin:20px 0;
}
button{
  background:#111;
  border:2px solid #00ff99;
  color:#00ff99;
  padding:15px 30px;
  margin:10px;
  font-size:18px;
  border-radius:8px;
}
button:active{
  background:#00ff99;
  color:#000;
}
.slider{
  width:80%;
  margin:20px 0;
}
</style>
</head>
<body>

<header>ROOM: bandroom1</header>

<div class="bpm" id="bpmDisplay">120</div>
<button id="bpmDown">−</button>
<button id="bpmUp">＋</button>

<br><br>

<button id="enableAudio">音声有効化</button>
<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<br><br>
<input type="range" id="volume" class="slider" min="0" max="1" step="0.01" value="1">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqx-jpLl3Q30iTrHA5YPWJRMI9-abm1Pg",
  authDomain: "earmonitor.firebaseapp.com",
  databaseURL: "https://earmonitor-default-rtdb.firebaseio.com/",
  projectId: "earmonitor",
  storageBucket: "earmonitor.firebasestorage.app",
  messagingSenderId: "504316277047",
  appId: "1:504316277047:web:117cbb8f831dc8ba81eab2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const roomRef = ref(db,"rooms/bandroom1");

let audioContext;
let gainNode;
let clickInterval;
let currentBpm = 120;

/* 音声有効化 */
document.getElementById("enableAudio").onclick = ()=>{
  audioContext = new (window.AudioContext||window.webkitAudioContext)();
  gainNode = audioContext.createGain();
  gainNode.connect(audioContext.destination);
  alert("音声準備OK");
};

/* 音量 */
document.getElementById("volume").oninput=e=>{
  if(gainNode) gainNode.gain.value=e.target.value;
};

/* BPM変更 */
document.getElementById("bpmUp").onclick=()=>{
  currentBpm++;
  update(roomRef,{ bpm: currentBpm });
};
document.getElementById("bpmDown").onclick=()=>{
  if(currentBpm>30) currentBpm--;
  update(roomRef,{ bpm: currentBpm });
};

/* START */
document.getElementById("startBtn").onclick=()=>{
  update(roomRef,{
    isPlaying: true,
    bpm: currentBpm
  });
};

/* STOP */
document.getElementById("stopBtn").onclick=()=>{
  update(roomRef,{
    isPlaying: false
  });
  stopClick();
};

/* クリック音 */
function startClick(bpm){
  stopClick();
  clickInterval = setInterval(()=>{
    const osc = audioContext.createOscillator();
    const g = audioContext.createGain();
    osc.frequency.value = 1000;
    g.gain.value = 0.4;
    osc.connect(g);
    g.connect(gainNode);
    osc.start();
    osc.stop(audioContext.currentTime + 0.05);
  },60000/bpm);
}

function stopClick(){
  if(clickInterval) clearInterval(clickInterval);
}

/* データ監視 */
onValue(roomRef,(snapshot)=>{
  const data = snapshot.val();
  if(!data) return;

  currentBpm = data.bpm || 120;
  document.getElementById("bpmDisplay").textContent = currentBpm;

  if(!audioContext) return;

  if(data.isPlaying){
    startClick(currentBpm);
  }else{
    stopClick();
  }
});
</script>
</body>
</html>
