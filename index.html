<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sync Monitor</title>

<style>

body{
margin:0;
background:#0b0b0f;
color:#00ff99;
font-family:monospace;
text-align:center;
}

header{
padding:15px;
font-size:20px;
border-bottom:1px solid #00ff99;
}

.bpm{
font-size:70px;
text-shadow:0 0 20px #00ff99;
margin:20px 0;
}

.count{
font-size:90px;
height:100px;
}

.led{
width:20px;
height:20px;
border-radius:50%;
display:inline-block;
background:#111;
box-shadow:0 0 10px #000;
margin:10px;
}

.led.on{
background:#ff0033;
box-shadow:0 0 20px #ff0033;
}

button{
background:#111;
border:2px solid #00ff99;
color:#00ff99;
padding:15px 30px;
margin:10px;
font-size:18px;
border-radius:8px;
}

button:active{
background:#00ff99;
color:#000;
}

.slider{
width:80%;
margin:20px 0;
}

</style>
</head>
<body>

<header>ROOM : bandroom1</header>

<div class="bpm" id="bpmDisplay">120</div>

<button id="bpmDown">−</button>
<button id="bpmUp">＋</button>

<div class="count" id="countdown"></div>

<div class="led" id="tempoLed"></div>

<br>

<button id="enableAudio">音声有効化</button>
<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<br>

<input type="range" id="volume" class="slider" min="0" max="1" step="0.01" value="1">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, update }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyAqx-jpLl3Q30iTrHA5YPWJRMI9-abm1Pg",
authDomain:"earmonitor.firebaseapp.com",
databaseURL:"https://earmonitor-default-rtdb.firebaseio.com/",
projectId:"earmonitor",
storageBucket:"earmonitor.firebasestorage.app",
messagingSenderId:"504316277047",
appId:"1:504316277047:web:117cbb8f831dc8ba81eab2"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const roomRef=ref(db,"rooms/bandroom1");

let audioContext;
let gainNode;

let currentBpm=120;

let startTimeout=null;
let intervalTimer=null;
let countTimer=null;

let running=false;

document.getElementById("enableAudio").onclick=async()=>{

audioContext=new(window.AudioContext||window.webkitAudioContext)();

gainNode=audioContext.createGain();
gainNode.gain.value=1;
gainNode.connect(audioContext.destination);

await audioContext.resume();

};

document.getElementById("volume").oninput=e=>{
if(gainNode)gainNode.gain.value=e.target.value;
};

document.getElementById("bpmUp").onclick=()=>{
currentBpm++;
update(roomRef,{bpm:currentBpm});
};

document.getElementById("bpmDown").onclick=()=>{
if(currentBpm>30)currentBpm--;
update(roomRef,{bpm:currentBpm});
};

document.getElementById("startBtn").onclick=()=>{

const startTime=Date.now()+2000;

update(roomRef,{
isPlaying:true,
bpm:currentBpm,
startAt:startTime
});

};

document.getElementById("stopBtn").onclick=()=>{
update(roomRef,{isPlaying:false});
stopAll();
};

function stopAll(){

running=false;

if(startTimeout)clearTimeout(startTimeout);
if(intervalTimer)clearInterval(intervalTimer);
if(countTimer)clearInterval(countTimer);

startTimeout=null;
intervalTimer=null;
countTimer=null;

document.getElementById("countdown").textContent="";

}

function startSequence(bpm,startAt){

if(running)return;

running=true;

const interval=(60/bpm)*1000;

const delay=startAt-Date.now();

startTimeout=setTimeout(()=>{

let count=4;

document.getElementById("countdown").textContent=count;

countTimer=setInterval(()=>{

playClick(true);

flashLed();

count--;

if(count>0){

document.getElementById("countdown").textContent=count;

}else{

clearInterval(countTimer);

document.getElementById("countdown").textContent="";

startMetronome();

}

},interval);

},delay);

function startMetronome(){

intervalTimer=setInterval(()=>{

playClick(true);

flashLed();

},interval);

}

}

function playClick(){

if(!audioContext)return;

if(audioContext.state==="suspended"){
audioContext.resume();
}

const osc=audioContext.createOscillator();
const gain=audioContext.createGain();

osc.frequency.value=1600;
gain.gain.value=0.4;

osc.connect(gain);
gain.connect(gainNode);

osc.start();
osc.stop(audioContext.currentTime+0.05);

}

function flashLed(){

const led=document.getElementById("tempoLed");

led.classList.add("on");

setTimeout(()=>{
led.classList.remove("on");
},100);

}

onValue(roomRef,(snap)=>{

const data=snap.val();
if(!data)return;

currentBpm=data.bpm||120;
document.getElementById("bpmDisplay").textContent=currentBpm;

if(!audioContext)return;

if(data.isPlaying){

startSequence(currentBpm,data.startAt);

}else{

stopAll();

}

});

</script>

</body>
</html>
