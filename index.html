<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sync Monitor</title>

<style>
body{
  margin:0;
  background:#0b0b0f;
  color:#00ff99;
  font-family:monospace;
  text-align:center;
}
header{
  padding:15px;
  font-size:20px;
  border-bottom:1px solid #00ff99;
}
.bpm{
  font-size:70px;
  text-shadow:0 0 20px #00ff99;
  margin:20px 0;
}
.countdown{
  font-size:120px;
  height:140px;
  margin:10px 0;
  text-shadow:0 0 30px #00ff99;
}
button{
  background:#111;
  border:2px solid #00ff99;
  color:#00ff99;
  padding:15px 30px;
  margin:10px;
  font-size:18px;
  border-radius:8px;
}
button:active{
  background:#00ff99;
  color:#000;
}
.slider{
  width:80%;
  margin:20px 0;
}
</style>
</head>
<body>

<header>ROOM: bandroom1</header>

<div class="bpm" id="bpmDisplay">120</div>
<div class="countdown" id="countdown"></div>

<button id="bpmDown">−</button>
<button id="bpmUp">＋</button>

<br><br>

<button id="enableAudio">音声有効化</button>
<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<br><br>
<input type="range" id="volume" class="slider" min="0" max="1" step="0.01" value="1">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, update, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqx-jpLl3Q30iTrHA5YPWJRMI9-abm1Pg",
  authDomain: "earmonitor.firebaseapp.com",
  databaseURL: "https://earmonitor-default-rtdb.firebaseio.com/",
  projectId: "earmonitor"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const roomRef = ref(db,"rooms/bandroom1");

let audioContext;
let gainNode;
let currentBpm = 120;
let isClicking = false;

/* 音声有効化 */
document.getElementById("enableAudio").onclick = async ()=>{
  audioContext = new (window.AudioContext||window.webkitAudioContext)();
  gainNode = audioContext.createGain();
  gainNode.connect(audioContext.destination);
  await audioContext.resume();
  alert("音声準備OK");
};

/* 音量 */
document.getElementById("volume").oninput=e=>{
  if(gainNode) gainNode.gain.value=e.target.value;
};

/* BPM変更 */
document.getElementById("bpmUp").onclick=()=>{
  currentBpm++;
  update(roomRef,{ bpm: currentBpm });
};
document.getElementById("bpmDown").onclick=()=>{
  if(currentBpm>30) currentBpm--;
  update(roomRef,{ bpm: currentBpm });
};

/* START（サーバー基準＋4秒後開始） */
document.getElementById("startBtn").onclick=()=>{
  update(roomRef,{
    isPlaying: true,
    bpm: currentBpm,
    startTime: serverTimestamp()
  });
};

document.getElementById("stopBtn").onclick=()=>{
  update(roomRef,{ isPlaying: false });
  stopClick();
};

/* カウントダウン表示 */
function showCountdown(targetTime){
  const el = document.getElementById("countdown");

  function updateCount(){
    const diff = targetTime - Date.now();
    if(diff > 0){
      const sec = Math.ceil(diff / 1000);
      el.textContent = sec;
      requestAnimationFrame(updateCount);
    }else{
      el.textContent = "";
    }
  }

  updateCount();
}

/* メトロノーム（1拍目アクセント） */
function scheduleClick(bpm, targetTime){
  if(!audioContext){
    audioContext = new (window.AudioContext||window.webkitAudioContext)();
    gainNode = audioContext.createGain();
    gainNode.connect(audioContext.destination);
  }

  audioContext.resume();

  isClicking = true;

  const interval = 60 / bpm;
  let beat = 0;

  const startAt = audioContext.currentTime + (targetTime - Date.now())/1000;

  function schedule(){
    if(!isClicking) return;

    const osc = audioContext.createOscillator();
    const g = audioContext.createGain();

    osc.frequency.value = (beat % 4 === 0) ? 1500 : 1000;
    g.gain.value = 0.4;

    osc.connect(g);
    g.connect(gainNode);

    osc.start(startAt + beat * interval);
    osc.stop(startAt + beat * interval + 0.05);

    beat++;

    setTimeout(schedule, interval*1000);
  }

  schedule();
}

/* データ監視 */
onValue(roomRef,(snapshot)=>{
  const data = snapshot.val();
  if(!data) return;

  currentBpm = data.bpm || 120;
  document.getElementById("bpmDisplay").textContent = currentBpm;

  if(data.isPlaying && data.startTime){

    const targetTime = data.startTime + 4000;

    showCountdown(targetTime);

    scheduleClick(currentBpm, targetTime);

  }else{
    stopClick();
    document.getElementById("countdown").textContent="";
  }
});
</script>
</body>
</html>
