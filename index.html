<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Band Sync Monitor</title>

<style>

body{
background:#0b0b0f;
color:#00ffaa;
font-family:monospace;
text-align:center;
}

.panel{
padding:20px;
}

button{
background:#111;
border:2px solid #00ffaa;
color:#00ffaa;
padding:12px 30px;
margin:10px;
font-size:16px;
border-radius:8px;
}

button:hover{
background:#00ffaa;
color:black;
}

.slider{
width:80%;
margin:10px;
}

#bpmDisplay{
font-size:60px;
text-shadow:0 0 20px #00ffaa;
}

input{
margin:10px;
}

</style>
</head>
<body>

<div class="panel">

<h2>Band Sync Room</h2>

<div id="bpmDisplay">120 BPM</div>

<input type="range" id="bpmSlider" class="slider"
min="60" max="200" value="120">

<br>

<button id="enableAudio">音声有効化</button>
<button id="startBtn">START</button>
<button id="stopBtn">STOP</button>

<br><br>

<h3>MP3共有</h3>
<input type="file" id="audioUpload">

<h3>YouTube共有</h3>
<input type="text" id="youtubeURL" placeholder="YouTube URL">
<button id="setYoutube">共有</button>

<br><br>

<div id="youtubePlayer"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
getFirestore,
doc,
setDoc,
updateDoc,
onSnapshot,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";


/* Firebase設定 */
const firebaseConfig = {

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const roomId="bandroom";
const roomRef=doc(db,"rooms",roomId);

let audioContext;
let gainNode;

let buffer;
let source;

let bpm=120;

let timeOffset=0;

let nextClickTime=0;

let clickInterval;


/* 音声有効化 */

document.getElementById("enableAudio").onclick=async()=>{

audioContext=new(window.AudioContext||window.webkitAudioContext)();

gainNode=audioContext.createGain();

gainNode.connect(audioContext.destination);

await syncServerTime();

alert("Audio Ready");

};


/* サーバー時刻同期 */

async function syncServerTime(){

const refDoc=doc(db,"rooms","timeSync");

await setDoc(refDoc,{now:serverTimestamp()});

onSnapshot(refDoc,(snap)=>{

if(!snap.data())return;

const serverTime=snap.data().now.toMillis();

const localTime=Date.now();

timeOffset=serverTime-localTime;

});

}


/* BPMスライダー */

const bpmSlider=document.getElementById("bpmSlider");

bpmSlider.oninput=async(e)=>{

bpm=e.target.value;

document.getElementById("bpmDisplay").innerText=bpm+" BPM";

await updateDoc(roomRef,{bpm:bpm});

};


/* MP3アップロード */

document.getElementById("audioUpload")
.addEventListener("change",async(e)=>{

const file=e.target.files[0];

const storageRef=ref(storage,"audio/"+file.name);

await uploadBytes(storageRef,file);

const url=await getDownloadURL(storageRef);

await updateDoc(roomRef,{audioURL:url});

});


/* YouTube共有 */

document.getElementById("setYoutube").onclick=async()=>{

const url=document.getElementById("youtubeURL").value;

await updateDoc(roomRef,{youtube:url});

};



/* メトロノーム */

function startMetronome(startTime){

const interval=60/bpm;

nextClickTime=startTime;

clickInterval=setInterval(()=>{

while(nextClickTime<audioContext.currentTime+0.1){

const osc=audioContext.createOscillator();

const gain=audioContext.createGain();

osc.frequency.value=1000;

gain.gain.value=0.7;

osc.connect(gain);

gain.connect(gainNode);

osc.start(nextClickTime);

osc.stop(nextClickTime+0.05);

nextClickTime+=interval;

}

},25);

}


/* START */

document.getElementById("startBtn").onclick=async()=>{

const startAt=Date.now()+timeOffset+5000;

await updateDoc(roomRef,{

isPlaying:true,

startAt:startAt,

updatedAt:serverTimestamp()

});

};


/* STOP */

document.getElementById("stopBtn").onclick=async()=>{

await updateDoc(roomRef,{isPlaying:false});

if(source)source.stop();

clearInterval(clickInterval);

};



/* ルーム監視 */

onSnapshot(roomRef,async(snap)=>{

const data=snap.data();

if(!data)return;



/* BPM同期 */

if(data.bpm){

bpm=data.bpm;

document.getElementById("bpmSlider").value=bpm;

document.getElementById("bpmDisplay").innerText=bpm+" BPM";

}



/* MP3ロード */

if(data.audioURL && !buffer){

const res=await fetch(data.audioURL);

const arr=await res.arrayBuffer();

buffer=await audioContext.decodeAudioData(arr);

}



/* YouTube表示 */

if(data.youtube){

const id=data.youtube.split("v=")[1];

document.getElementById("youtubePlayer").innerHTML=

`<iframe width="300" height="170"
src="https://www.youtube.com/embed/${id}"
allow="autoplay"></iframe>`;

}



/* 再生 */

if(data.isPlaying){

const delay=(data.startAt-Date.now()-timeOffset)/1000;

if(buffer){

source=audioContext.createBufferSource();

source.buffer=buffer;

source.connect(gainNode);

source.start(audioContext.currentTime+delay);

}

startMetronome(audioContext.currentTime+delay);

}



});



/* 定期再同期（ズレ防止） */

setInterval(syncServerTime,10000);

</script>

</body>
</html>
