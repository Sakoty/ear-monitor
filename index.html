<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, update }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqx-jpLl3Q30iTrHA5YPWJRMI9-abm1Pg",
  authDomain: "earmonitor.firebaseapp.com",
  databaseURL: "https://earmonitor-default-rtdb.firebaseio.com/",
  projectId: "earmonitor",
  storageBucket: "earmonitor.firebasestorage.app",
  messagingSenderId: "504316277047",
  appId: "1:504316277047:web:117cbb8f831dc8ba81eab2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const roomRef = ref(db,"rooms/bandroom1");

let audioContext;
let gainNode;
let currentBpm = 120;
let isClicking = false;
let serverOffset = 0;

/* ===== サーバー時間取得 ===== */
onValue(ref(db, ".info/serverTimeOffset"), (snap)=>{
  serverOffset = snap.val() || 0;
});

function getServerTime(){
  return Date.now() + serverOffset;
}

/* ===== 音声有効化 ===== */
document.getElementById("enableAudio").onclick = async ()=>{
  audioContext = new (window.AudioContext||window.webkitAudioContext)();
  gainNode = audioContext.createGain();
  gainNode.connect(audioContext.destination);
  await audioContext.resume();
  alert("音声準備OK");
};

/* ===== 音量 ===== */
document.getElementById("volume").oninput=e=>{
  if(gainNode) gainNode.gain.value=e.target.value;
};

/* ===== BPM変更 ===== */
document.getElementById("bpmUp").onclick=()=>{
  currentBpm++;
  update(roomRef,{ bpm: currentBpm });
};
document.getElementById("bpmDown").onclick=()=>{
  if(currentBpm>30) currentBpm--;
  update(roomRef,{ bpm: currentBpm });
};

/* ===== START（4秒後） ===== */
document.getElementById("startBtn").onclick=()=>{
  const startAt = getServerTime() + 4000;

  update(roomRef,{
    isPlaying: true,
    bpm: currentBpm,
    startAt: startAt
  });
};

/* ===== STOP ===== */
document.getElementById("stopBtn").onclick=()=>{
  update(roomRef,{ isPlaying:false });
  stopClick();
};

/* ===== クリック再生 ===== */
function scheduleClick(startAt, bpm){
  if(!audioContext) return;

  const interval = 60 / bpm;
  const now = getServerTime();
  const delay = (startAt - now) / 1000;

  if(delay < 0) return;

  const startTime = audioContext.currentTime + delay;
  let nextTime = startTime;
  isClicking = true;

  function tick(){
    if(!isClicking) return;

    const osc = audioContext.createOscillator();
    const g = audioContext.createGain();

    osc.frequency.value = 1000;
    g.gain.value = 0.4;

    osc.connect(g);
    g.connect(gainNode);

    osc.start(nextTime);
    osc.stop(nextTime + 0.05);

    nextTime += interval;

    if(nextTime < audioContext.currentTime + 1){
      requestAnimationFrame(tick);
    }else{
      setTimeout(tick, 50);
    }
  }

  tick();
}

function stopClick(){
  isClicking = false;
}

/* ===== データ監視 ===== */
onValue(roomRef,(snapshot)=>{
  const data = snapshot.val();
  if(!data) return;

  currentBpm = data.bpm || 120;
  document.getElementById("bpmDisplay").textContent = currentBpm;

  if(!audioContext) return;

  if(data.isPlaying && data.startAt){
    scheduleClick(data.startAt, currentBpm);
  }else{
    stopClick();
  }
});
</script>
