<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sync Monitor</title>

<style>
body{
  margin:0;
  background:#0b0b0f;
  color:#00ff99;
  font-family:monospace;
  text-align:center;
}

header{
  padding:15px;
  font-size:20px;
  border-bottom:1px solid #00ff99;
}

.bpm{
  font-size:70px;
  text-shadow:0 0 20px #00ff99;
  margin:20px 0;
}

.bpm-controls button{
  background:#111;
  border:2px solid #00ff99;
  color:#00ff99;
  font-size:20px;
  padding:10px 20px;
  margin:5px;
  border-radius:6px;
}

.controls button{
  background:#111;
  border:2px solid #00ff99;
  color:#00ff99;
  padding:15px 30px;
  margin:10px;
  font-size:18px;
  border-radius:8px;
}

.controls button:active,
.bpm-controls button:active{
  background:#00ff99;
  color:#000;
}

.slider{
  width:80%;
  margin:20px 0;
}

.led{
  width:15px;
  height:15px;
  border-radius:50%;
  display:inline-block;
  background:#111;
  box-shadow:0 0 10px #000;
}

.led.on{
  background:#ff0033;
  box-shadow:0 0 15px #ff0033;
}
</style>
</head>
<body>

<header>ROOM: bandroom1</header>

<div class="bpm" id="bpmDisplay">120</div>

<div class="bpm-controls">
  <button id="bpmDown">−</button>
  <button id="bpmUp">＋</button>
</div>

<div>
  <div class="led" id="statusLed"></div>
  <p id="statusText">STOPPED</p>
</div>

<div class="controls">
  <button id="enableAudio">音声有効化</button><br>
  <input type="file" id="audioUpload"><br>
  <button id="startBtn">START (5秒後)</button>
  <button id="stopBtn">STOP</button>
  <button id="resyncBtn">再同期</button>
</div>

<h3>自分の音量</h3>
<input type="range" id="volume" class="slider" min="0" max="1" step="0.01" value="1">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, onSnapshot, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqx-jpLl3Q30iTrHA5YPWJRMI9-abm1Pg",
  authDomain: "earmonitor.firebaseapp.com",
  projectId: "earmonitor",
  storageBucket: "earmonitor.firebasestorage.app",
  messagingSenderId: "504316277047",
  appId: "1:504316277047:web:117cbb8f831dc8ba81eab2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const roomId = "bandroom1";
const roomRef = doc(db,"rooms",roomId);

let audioContext;
let gainNode;
let currentBpm = 120;

/* 音声有効化 */
document.getElementById("enableAudio").onclick = async ()=>{
  audioContext = new (window.AudioContext||window.webkitAudioContext)();
  gainNode = audioContext.createGain();
  gainNode.connect(audioContext.destination);
  alert("音声準備OK");
};

/* 音量 */
document.getElementById("volume").oninput=e=>{
  if(gainNode) gainNode.gain.value=e.target.value;
};

/* BPM変更 */
document.getElementById("bpmUp").onclick=()=>{
  currentBpm++;
  document.getElementById("bpmDisplay").textContent=currentBpm;
};

document.getElementById("bpmDown").onclick=()=>{
  if(currentBpm>30) currentBpm--;
  document.getElementById("bpmDisplay").textContent=currentBpm;
};
</script>

</body>
</html>
